<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Environmental Advocacy</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* DARK MODE TOGGLE */
.dark-toggle{
  position:fixed;
  top:15px;
  left:15px;
  z-index:1000;
}

#darkModeToggle{display:none;}

.toggle-label{
  width:44px;
  height:44px;
  background:#e0e0e0;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:22px;
}

body.dark .toggle-label{
  background:#333;
  color:white;
}

/* FONT SETTINGS */
body{
  font-family:"Times New Roman", Times, serif;
  font-size:20px;
}

h1{font-size:36px;}
h2{font-size:28px;}
p, nav a, input, button, label, select{font-size:20px;}
footer p{font-size:18px;}

/* HEADER */
header{
  background:#2e7d32;
  padding:20px;
  color:white;
  text-align:center;
}

header nav{
  margin-top:10px;
}

header nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  display:inline-block;
}

header nav a.active{
  font-weight:bold;
  text-decoration:underline;
}

/* MAIN */
main{padding:30px;}
form div{margin:10px 0;}
form input, form button, select{
  width:100%;
  padding:10px;
}

/* MESSAGES */
.error{color:red;font-size:16px;}
.success{
  color:green;
  font-size:18px;
  margin-top:20px;
  display:none;
  text-align:center;
  font-weight:bold;
}

/* FOOTER */
footer{
  background:#2e7d32;
  color:white;
  padding:30px 20px;
  margin-top:40px;
}

.footer-content{text-align:center;}
.footer-bottom{
  margin-top:20px;
  border-top:1px solid rgba(255,255,255,0.3);
  padding-top:15px;
}

/* DARK MODE */
body.dark{background:#121212;color:#f5f5f5;}
body.dark header{background:#1e4d33;}
body.dark footer{background:#1e1e1e;}
</style>
</head>

<body>

<!-- DARK MODE TOGGLE -->
<div class="dark-toggle">
  <input type="checkbox" id="darkModeToggle">
  <label for="darkModeToggle" class="toggle-label">🌙</label>
</div>

<header>
  <h1>Environmental Advocacy Portfolio</h1>
  <nav>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="register.html" class="active">Register</a>
  </nav>
</header>

<main>
<h2 style="text-align:center;">Registration Form</h2>

<form onsubmit="return validateForm()">

  <div>
    <label>Name:</label>
    <input type="text" id="name">
    <span id="nameError" class="error"></span>
  </div>

  <div>
    <label>Email:</label>
    <input type="email" id="email">
    <span id="emailError" class="error"></span>
  </div>

  <div>
    <label>Birthday:</label>
    <input type="date" id="birthday">
    <span id="birthdayError" class="error"></span>
  </div>

  <div>
    <label>Password:</label>
    <input type="password" id="password">
    <span id="passwordError" class="error"></span>
  </div>

  <div>
    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword">
    <span id="confirmPasswordError" class="error"></span>
  </div>

  <div>
    <label>Gender:</label><br>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Other
    <br>
    <span id="genderError" class="error"></span>
  </div>

  <div>
    <label>Account Type:</label>
    <select id="accountType">
      <option value="">Select</option>
      <option>Basic</option>
      <option>Premium</option>
      <option>Admin</option>
    </select>
    <span id="accountTypeError" class="error"></span>
  </div>

  <button type="submit">Register</button>

  <div id="formSuccess" class="success">✅ Register Successful</div>

</form>
</main>

<footer>
  <div class="footer-content">
    <p>Email: joelahnferrer20@gmail.com</p>
    <p>Location: Philippines</p>
  </div>
  <div class="footer-bottom" style="text-align:center;">
    <p>&copy; 2026 Student Portfolio Project</p>
  </div>
</footer>

<script>
/* DARK MODE */
const toggle=document.getElementById("darkModeToggle");
if(localStorage.getItem("darkMode")==="enabled"){
  document.body.classList.add("dark");
  toggle.checked=true;
}
toggle.addEventListener("change",()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem(
    "darkMode",
    document.body.classList.contains("dark")?"enabled":"disabled"
  );
});

/* FORM VALIDATION WITH AGE CHECK */
function validateForm(){
  let isValid=true;

  document.querySelectorAll(".error").forEach(e=>e.textContent="");
  document.getElementById("formSuccess").style.display="none";

  if(name.value===""){nameError.textContent="Required";isValid=false;}
  if(email.value===""){emailError.textContent="Required";isValid=false;}

  /* AGE VALIDATION */
  if(birthday.value===""){
    birthdayError.textContent="Required";
    isValid=false;
  }else{
    const today=new Date();
    const birthDate=new Date(birthday.value);
    let age=today.getFullYear()-birthDate.getFullYear();
    const m=today.getMonth()-birthDate.getMonth();

    if(m<0 || (m===0 && today.getDate()<birthDate.getDate())){
      age--;
    }

    if(age<18){
      birthdayError.textContent="Must be 18 years old or above";
      isValid=false;
    }
  }

  if(password.value.length<8){
    passwordError.textContent="Min 8 characters";
    isValid=false;
  }

  if(password.value!==confirmPassword.value){
    confirmPasswordError.textContent="Passwords do not match";
    isValid=false;
  }

  if(!document.querySelector('input[name="gender"]:checked')){
    genderError.textContent="Required";
    isValid=false;
  }

  if(accountType.value===""){
    accountTypeError.textContent="Required";
    isValid=false;
  }

  if(isValid){
    document.getElementById("formSuccess").style.display="block";
  }

  return false;
}
</script>

</body>
</html>
